name: Build Android APK

# Tự động biên dịch APK bản release (chạy offline được) mỗi khi đẩy code lên.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild (tạo project android)
        run: npx expo prebuild --platform android --no-install

      - name: Tăng bộ nhớ cho Gradle (chống lỗi hết RAM)
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx5632m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
            echo "org.gradle.daemon=false"
          } >> android/gradle.properties
          echo "----- gradle.properties -----"
          cat android/gradle.properties

      - name: Cấp quyền cho gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --max-workers=2

      - name: Liệt kê file APK
        run: find android/app/build/outputs/apk -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietlott-predictor-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
